name: Channel Manager V4
on:
  repository_dispatch:
    types: [process_video_v4]

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libsm6 libxext6
          pip install yt-dlp==2026.6.9 telethon==1.44.0 requests==2.34.2 brotli curl_cffi
      - name: Run processor
        timeout-minutes: 110
        env:
          API_ID: ${{ secrets.TG_API_ID }}
          API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.MASTER_BOT_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_AUTH_KEY: ${{ secrets.CF_GLOBAL_KEY }}
          CF_AI_MODEL: '@cf/aisingapore/gemma-sea-lion-v4-27b-it'
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TARGET_CHANNEL_ID: ${{ github.event.client_payload.target_channel_id }}
          VIDEO_URL: ${{ github.event.client_payload.video_url }}
          PHOTO_CAPTION: ${{ github.event.client_payload.photo_caption }}
          VIDEO_CAPTION: ${{ github.event.client_payload.video_caption }}
          NUM_PHOTOS: ${{ github.event.client_payload.num_photos }}
          POST_MODE: ${{ github.event.client_payload.post_mode }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          WORKER_URL: ${{ github.event.client_payload.worker_url }}
          TASK_ID: ${{ github.event.client_payload.task_id }}
          CHANNEL_ALIAS: ${{ github.event.client_payload.channel_alias }}
          WORKFLOW_NAME: 'V4'
          PH_COOKIES_B64: ${{ secrets.PH_COOKIES_B64 }}
        run: python process_video.py
